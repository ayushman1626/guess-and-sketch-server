# Production profile — activate via SPRING_PROFILES_ACTIVE=prod
spring.application.name=guess-and-sketch-server

# Server
server.port=${PORT:8080}

# CORS (set via environment variable on EC2/Docker)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging — structured output for production
logging.level.root=WARN
logging.level.com.Guess.Sketch=INFO
