<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
    <title>SketchGuess Test</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

</head>

<body>

<h2>SketchGuess Test Client</h2>

<input id="username" placeholder="Username">

<br><br>

<button onclick="createRoom()">Create Room</button>

<br><br>

<input id="roomId" placeholder="Room ID">

<button onclick="joinRoom()">Join Room</button>

<hr>

<h3>Drawing Board</h3>

<canvas id="board" width="600" height="400" style="border:1px solid black"></canvas>

<h3>Guess</h3>

<input id="guessInput" placeholder="Type guess">
<button onclick="sendGuess()">Guess</button>

<h3>Room Messages</h3>

<ul id="messages"></ul>
<input id="chatInput" placeholder="Type message">
<button onclick="sendChat()">Send</button>

<script>

    let stompClient = null;
    let currentRoom = null;

    function connect() {

        let socket = new SockJS("http://localhost:8080/ws");
        stompClient = Stomp.over(socket);

       stompClient.connect({}, function () {
            console.log("Connected");
            stompClient.subscribe("/user/queue/room-created", function(message) {
                let roomId = message.body;
                console.log("Room created:", roomId);
                subscribeToRoom(roomId);
            });

        });
    }

    connect();


    function createRoom() {

        let username = document.getElementById("username").value;

        stompClient.send("/app/createRoom", {}, JSON.stringify({
            username: username
        }));

    }


    function joinRoom() {

        let username = document.getElementById("username").value;
        let roomId = document.getElementById("roomId").value;

        currentRoom = roomId;

        stompClient.send("/app/joinRoom", {}, JSON.stringify({
            roomId: roomId,
            username: username
        }));
        subscribeToRoom(roomId);
    }

    let roomSubscription = null;

function subscribeToRoom(roomId) {

    if (roomSubscription) {
        roomSubscription.unsubscribe();
    }

    roomSubscription = stompClient.subscribe("/topic/room/" + roomId, function(message) {

        let li = document.createElement("li");
        li.innerText = message.body;

        document.getElementById("messages").appendChild(li);

    });

    stompClient.subscribe("/topic/room/" + roomId + "/chat", function(message) {

    let li = document.createElement("li");
    li.innerText = message.body;

    document.getElementById("messages").appendChild(li);

    });

    stompClient.subscribe("/topic/room/" + roomId + "/draw", function(message) {

    const drawEvent = JSON.parse(message.body);

    drawLine(
        drawEvent.prevX,
        drawEvent.prevY,
        drawEvent.currentX,
        drawEvent.currentY
    );

});
}
    function sendChat() {

    let message = document.getElementById("chatInput").value;

    stompClient.send("/app/chat", {}, JSON.stringify({
        message: message
    }));



}

//***************************************************************
    const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let drawing = false;
let prevX = 0;
let prevY = 0;

canvas.addEventListener("mousedown", function(e) {
    drawing = true;
    prevX = e.offsetX;
    prevY = e.offsetY;
});

canvas.addEventListener("mouseup", function() {
    drawing = false;
});

canvas.addEventListener("mousemove", function(e) {

    if (!drawing) return;

    const x = e.offsetX;
    const y = e.offsetY;

    drawLine(prevX, prevY, x, y);

    sendDraw(prevX, prevY, x, y);

    prevX = x;
    prevY = y;

});

    function drawLine(x1, y1, x2, y2) {

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

}

    function sendDraw(prevX, prevY, currentX, currentY) {

    stompClient.send("/app/draw", {}, JSON.stringify({

        prevX: prevX,
        prevY: prevY,
        currentX: currentX,
        currentY: currentY,
        color: "black"

    }));

}

    //****************
    function sendGuess() {

    let guess = document.getElementById("guessInput").value;

    stompClient.send("/app/guess", {}, JSON.stringify({
        message: guess
    }));

}

</script>


</body>
</html>
