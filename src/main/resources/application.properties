spring.application.name=guess-and-sketch-server

# Server port (override via PORT env var for AWS)
server.port=${PORT:8080}

# CORS: comma-separated allowed origins (override via CORS_ALLOWED_ORIGINS env var)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
